{% extends 'base.html' %}

{% block title %}Eliminar Producto{% endblock title %}

{% block content %}
<section class="form-card">
    <h2>Eliminar producto</h2>
    <p class="form-help">
        Estás por eliminar <strong>{{ producto.nombre }}</strong>. Esta acción no se puede deshacer.
    </p>

    <form method="post" class="producto-form">
        {% csrf_token %}
        <div class="form-actions">
            <a href="{% url 'productos:lista' %}" class="btn-secundario-link">Cancelar</a>
            <button type="submit" class="btn-delete">Sí, eliminar</button>
        </div>
    </form>
</section>
{% endblock content %}
